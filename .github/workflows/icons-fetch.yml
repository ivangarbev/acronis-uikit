# Fetches all icon SVGs from the Acronis Figma file into packages/icons-svg and
# opens a pull request with any changes.
#
# Pull-based: this workflow asks Figma for the current icon set, runs the
# `@acronis-platform/figma-icons-fetcher` tool (via the icons-svg `pull-icons`
# script), and — because `main` is branch-protected — proposes the result as a
# PR instead of pushing directly.
#
# The same sync can be run locally; see packages/icons-svg/README.md. This
# workflow just automates the "run + open PR" loop for people without a Figma
# token set up.
#
# Required secrets:
#   FIGMA_ACCESS_TOKEN  Figma personal access token (figd_…) with read access
#                       to the icons file. Shared with the Code Connect workflow.
#   ACV_TOKEN           GitHub PAT used to push the branch and open the PR so
#                       that branch-protection / CI runs on the resulting PR.
#
# All non-secret fetch config (file key, page/frame names, output dirs) is set
# in the "Fetch icons" step's env below — keep it in sync with
# packages/icons-svg/.env.local.example.
name: Fetch Figma Icons

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  fetch:
    # Don't run on forks — only the canonical repo holds the Figma token.
    if: github.repository == 'acronis/uikit'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PNPM
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch icons from Figma
        env:
          FIGMA_FETCHER_FIGMA_TOKEN: ${{ secrets.FIGMA_ACCESS_TOKEN }}
          FIGMA_FETCHER_FILE_KEY: SeWLzXxzzYfvfjzzbTYUl1
          FIGMA_FETCHER_PAGE_NAMES: 'Monocolor - Actions,Monocolor - Arrows,Monocolor - Brands+Products,Monocolor - Common,Monocolor - File types,Multicolor - Status,Multicolor - Tray Center'
          FIGMA_FETCHER_FRAME_NAMES: '16px,24px,32px,72px,96px'
          FIGMA_FETCHER_CLASS_NAME: ''
          FIGMA_FETCHER_SYSTEM_COLOR: '#2668C5'
          FIGMA_FETCHER_OUTPUT_DIR: './src/svg'
          FIGMA_FETCHER_OUTPUT_DIRS: ''
          FIGMA_FETCHER_GENERATE_MANIFESTS: 'true'
          FIGMA_FETCHER_MANIFEST_DIR: './src/figma'
          FIGMA_FETCHER_CATEGORIZE_BY_COLOR: 'true'
          FIGMA_FETCHER_MONOCOLOR_DIR: './src/monocolor-icons'
          FIGMA_FETCHER_MULTICOLOR_DIR: './src/multicolor-icons'
        run: pnpm --filter @acronis-platform/icons-svg pull-icons

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.ACV_TOKEN }}
          branch: chore/figma-icons-sync
          base: main
          add-paths: |
            packages/icons-svg/src/**
          commit-message: 'chore(icons-svg): sync icons from Figma'
          title: 'chore(icons-svg): sync icons from Figma'
          body: |
            Automated icon sync from the Acronis Figma file.

            Pulled by the **Fetch Figma Icons** workflow via
            `@acronis-platform/figma-icons-fetcher`.

            - `src/svg/` is a clean mirror of the current Figma set.
            - `src/monocolor-icons/` and `src/multicolor-icons/` only gain new
              icons (append-only — existing icons are preserved).

            Review the diff for unexpected removals or renames before merging.
          labels: |
            icons
            automated
          delete-branch: true
