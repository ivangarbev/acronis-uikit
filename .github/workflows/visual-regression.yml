# .github/workflows/visual-regression.yml
name: Visual Regression

on: [pull_request]

jobs:
  visual-regression:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ui-legacy
            filter: '@acronis-platform/shadcn-uikit'
            dir: packages/ui-legacy
          - name: ui-react
            filter: '@acronis-platform/ui-react'
            dir: packages/ui-react
    name: visual-regression (${{ matrix.name }})
    steps:
      - uses: actions/checkout@v6

      - name: Setup PNPM
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Vite module cache + Storybook builder cache — key on source so only
      # changed files are recompiled when the cache is restored.
      - name: Cache Storybook build
        uses: actions/cache@v4
        with:
          path: |
            ${{ matrix.dir }}/node_modules/.vite
            ${{ matrix.dir }}/node_modules/.cache/storybook
          key: storybook-${{ matrix.name }}-${{ runner.os }}-${{ hashFiles(format('{0}/src/**', matrix.dir), format('{0}/.storybook/**', matrix.dir), format('{0}/package.json', matrix.dir)) }}
          restore-keys: storybook-${{ matrix.name }}-${{ runner.os }}-

      # ui-react depends on generated workspace packages — notably
      # @acronis-platform/icons-react, whose sources are generated + gitignored
      # and which ships from dist/. Its dependency graph must be built before
      # Storybook can resolve those imports. ui-legacy is a leaf and needs no
      # pre-build. Mirrors ci.yml's `pnpm --filter "@acronis-platform/ui-react..."`.
      - name: Build workspace dependencies
        if: matrix.name == 'ui-react'
        run: pnpm --filter "${{ matrix.filter }}..." run build

      - name: Build Storybook
        run: pnpm --filter ${{ matrix.filter }} storybook:build

      # Docker only serves the pre-built static output and runs Playwright.
      # --build rebuilds the image when Dockerfile or .storybook config changes.
      - name: Run visual regression tests
        run: docker compose -f ${{ matrix.dir }}/docker-compose.storybook.yml up --build --abort-on-container-exit --exit-code-from test-runner

      - name: Upload diff artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-diffs-${{ matrix.name }}
          path: ${{ matrix.dir }}/test/__snapshots__/__diff_output__/
