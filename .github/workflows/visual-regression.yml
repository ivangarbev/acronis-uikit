# .github/workflows/visual-regression.yml
name: Visual Regression

on: [pull_request]

jobs:
  visual-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup PNPM
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Vite module cache + Storybook builder cache — key on source so only
      # changed files are recompiled when the cache is restored.
      - name: Cache Storybook build
        uses: actions/cache@v4
        with:
          path: |
            packages/legacy/ui/node_modules/.vite
            packages/legacy/ui/node_modules/.cache/storybook
          key: storybook-${{ runner.os }}-${{ hashFiles('packages/legacy/ui/src/**', 'packages/legacy/ui/.storybook/**', 'packages/legacy/ui/package.json') }}
          restore-keys: storybook-${{ runner.os }}-

      - name: Build Storybook
        run: pnpm --filter @acronis-platform/shadcn-uikit storybook:build

      # Docker only serves the pre-built static output and runs Playwright.
      # --build rebuilds the image when Dockerfile or .storybook config changes.
      - name: Run visual regression tests
        run: docker compose -f packages/legacy/ui/docker-compose.storybook.yml up --build --abort-on-container-exit --exit-code-from test-runner

      - name: Upload diff artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-diffs
          path: packages/legacy/ui/test/__snapshots__/__diff_output__/
