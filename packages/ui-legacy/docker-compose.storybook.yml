# packages/ui-legacy/docker-compose.storybook.yml
#
# Build context is the repo root (../../..) because the Dockerfile needs the
# workspace manifests (pnpm-workspace.yaml, pnpm-lock.yaml) to install deps.
# Host volume paths in this file are resolved relative to THIS file's
# directory (packages/ui-legacy/), so e.g. ./storybook-static refers to
# packages/ui-legacy/storybook-static.
#
# Invoke from anywhere with:
#   docker compose -f packages/ui-legacy/docker-compose.storybook.yml up ...
services:
  storybook:
    build:
      context: ../../..
      dockerfile: packages/ui-legacy/Dockerfile.storybook
    image: shadcn-uikit-storybook
    ports:
      - '6006:6006'
    # Serve the pre-built static output from the host — no build step in Docker
    volumes:
      - ./storybook-static:/app/packages/ui-legacy/storybook-static:ro
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:6006 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  test-runner:
    build:
      context: ../../..
      dockerfile: packages/ui-legacy/Dockerfile.storybook
    image: shadcn-uikit-storybook
    command: pnpm exec test-storybook --url http://storybook:6006 --maxWorkers=4
    depends_on:
      storybook:
        condition: service_healthy
    volumes:
      - ./test/__snapshots__:/app/packages/ui-legacy/test/__snapshots__
